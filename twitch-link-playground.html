<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Twitch Link Result Playground</title>
  <style>
    :root {
      --bg: #171322;
      --panel: rgba(34, 27, 48, 0.94);
      --panel-strong: rgba(22, 18, 32, 0.98);
      --border: #d9c78f;
      --gold: #f4d37c;
      --text: #f8f0dc;
      --muted: #c9bdd8;
      --success: #38d675;
      --error: #ff6b7d;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(16, 12, 24, 0.96), rgba(31, 24, 45, 0.98)),
        radial-gradient(circle at 50% 0%, rgba(244, 211, 124, 0.14), transparent 46%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 28px;
    }

    main {
      width: min(620px, 100%);
      padding: 28px;
      border: 2px solid rgba(217, 199, 143, 0.82);
      border-radius: 10px;
      background:
        linear-gradient(180deg, rgba(49, 39, 68, 0.88), var(--panel-strong));
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.42);
      text-align: center;
    }

    .mark {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      margin: 0 auto 16px;
      border: 2px solid var(--status);
      border-radius: 50%;
      color: var(--status);
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(28px, 7vw, 46px);
      line-height: 1;
      color: var(--text);
    }

    .message {
      margin: 16px auto 0;
      max-width: 48ch;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    ul {
      width: min(440px, 100%);
      margin: 22px auto 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    li {
      padding: 10px 12px;
      border: 1px solid rgba(217, 199, 143, 0.34);
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      font-weight: 700;
    }

    .action {
      margin: 24px 0 0;
      padding-top: 18px;
      border-top: 1px solid rgba(217, 199, 143, 0.26);
      color: var(--gold);
      font-weight: 800;
    }

    .playground-label {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 2;
      margin: 0;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.58);
      color: rgba(255, 255, 255, 0.86);
      font-size: 12px;
      font-weight: 700;
    }

    .controls {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 2;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .controls button {
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .controls button:hover {
      background: rgba(34, 34, 34, 0.82);
    }

    @media (max-width: 520px) {
      body { padding: 18px; }
      main { padding: 22px 18px; }
      h1 { font-size: 30px; }
      .message { font-size: 15px; }
      .controls {
        right: 8px;
        bottom: 8px;
        left: 8px;
      }
    }
  </style>
</head>
<body>
  <p class="playground-label">Twitch link page playground</p>

  <main id="card">
    <div id="mark" class="mark" aria-hidden="true"></div>
    <p id="eyebrow" class="eyebrow"></p>
    <h1 id="title"></h1>
    <p id="message" class="message"></p>
    <ul id="details"></ul>
    <p id="action" class="action"></p>
  </main>

  <div class="controls">
    <button type="button" id="successButton">Success</button>
    <button type="button" id="expiredButton">Expired</button>
    <button type="button" id="errorButton">Error</button>
  </div>

  <script>
    const states = {
      success: {
        status: 'success',
        eyebrow: 'The Lore Collector',
        title: 'Twitch Linked',
        message: 'FeyreDarrling is now connected to your Discord collection.',
        details: [
          'Merged 12 Twitch card(s) into your Discord collection.',
          'Future Twitch pulls will save to your Discord collection automatically.'
        ],
        action: 'You can return to Discord now.'
      },
      expired: {
        status: 'error',
        eyebrow: 'The Lore Collector',
        title: 'Link Expired',
        message: 'This Twitch link request expired before it could be completed.',
        details: [],
        action: 'Return to Discord and press Link Twitch Account again.'
      },
      error: {
        status: 'error',
        eyebrow: 'The Lore Collector',
        title: 'Merge Failed',
        message: 'Your Twitch account linked, but merging your saved Twitch cards failed.',
        details: [],
        action: 'Please contact the channel owner before linking again.'
      }
    };

    const card = document.getElementById('card');
    const mark = document.getElementById('mark');
    const eyebrow = document.getElementById('eyebrow');
    const title = document.getElementById('title');
    const message = document.getElementById('message');
    const details = document.getElementById('details');
    const action = document.getElementById('action');

    function renderState(state) {
      const isSuccess = state.status === 'success';
      card.style.setProperty('--status', isSuccess ? 'var(--success)' : 'var(--error)');
      mark.textContent = isSuccess ? '✓' : '!';
      eyebrow.textContent = state.eyebrow;
      title.textContent = state.title;
      message.textContent = state.message;
      action.textContent = state.action;
      details.innerHTML = '';
      details.hidden = state.details.length === 0;

      state.details.forEach(item => {
        const detail = document.createElement('li');
        detail.textContent = item;
        details.appendChild(detail);
      });
    }

    document.getElementById('successButton').addEventListener('click', () => renderState(states.success));
    document.getElementById('expiredButton').addEventListener('click', () => renderState(states.expired));
    document.getElementById('errorButton').addEventListener('click', () => renderState(states.error));
    renderState(states.success);
  </script>
</body>
</html>
